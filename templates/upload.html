{% extends "base.html" %}
{% block title %}upload — nyapost{% endblock %}
{% block content %}
<div class="upload-container">
    <h1>upload a nyapost</h1>

    {% if error %}
    <div class="upload-error">{{ error }}</div>
    {% endif %}

    <form class="upload-form" id="upload-form" action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="upload-dropzone" id="dropzone">
            <input type="file" name="file" id="file-input" accept=".jpg,.jpeg,.png,.gif,.webp,.mp4,.webm,.mov" hidden>

            <div class="upload-dropzone-empty" id="dz-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="upload-dropzone-text">drop a file here or <span class="upload-link">browse</span></p>
                <p class="upload-dropzone-hint">images &amp; video &middot; up to 500 MB</p>
            </div>

            <div class="upload-dropzone-preview" id="dz-preview" hidden>
                <div class="upload-preview-media" id="preview-media"></div>
                <div class="upload-preview-info">
                    <span class="upload-preview-name" id="preview-name"></span>
                    <span class="upload-preview-size" id="preview-size"></span>
                </div>
                <button type="button" class="upload-preview-remove" id="preview-remove" title="remove file">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="upload-formats">
            <span>JPG</span><span>PNG</span><span>GIF</span><span>WebP</span><span>MP4</span><span>WebM</span><span>MOV</span>
        </div>

        <div class="upload-validation-error" id="upload-error" hidden></div>

        <button type="submit" class="btn btn-primary upload-submit" id="upload-submit" disabled>
            <span class="upload-submit-text" id="submit-text">select a file</span>
            <span class="upload-spinner" id="upload-spinner" hidden>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="spinner-icon">
                    <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                    <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
                </svg>
                uploading…
            </span>
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const dzEmpty = document.getElementById('dz-empty');
const dzPreview = document.getElementById('dz-preview');
const previewMedia = document.getElementById('preview-media');
const previewName = document.getElementById('preview-name');
const previewSize = document.getElementById('preview-size');
const previewRemove = document.getElementById('preview-remove');
const uploadError = document.getElementById('upload-error');
const submitBtn = document.getElementById('upload-submit');
const submitText = document.getElementById('submit-text');
const uploadSpinner = document.getElementById('upload-spinner');
const uploadForm = document.getElementById('upload-form');

const ALLOWED_EXT = new Set(['.jpg', '.jpeg', '.png', '.gif', '.webp', '.mp4', '.webm', '.mov']);
const MAX_SIZE = 500 * 1024 * 1024;

function formatSize(bytes) {
    if (bytes >= 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
    if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return bytes + ' B';
}

function showError(msg) {
    uploadError.textContent = msg;
    uploadError.hidden = false;
}

function clearError() {
    uploadError.hidden = true;
    uploadError.textContent = '';
}

function showPreview(file) {
    clearError();

    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!ALLOWED_EXT.has(ext)) {
        showError('nooo `' + ext + '` is not supported :3c');
        submitBtn.disabled = true;
        submitText.textContent = 'select a file';
        return;
    }

    if (file.size > MAX_SIZE) {
        showError('thats too big!! max 500 MB :3c');
        submitBtn.disabled = true;
        submitText.textContent = 'select a file';
        return;
    }

    previewMedia.innerHTML = '';

    if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.alt = '';
        previewMedia.appendChild(img);
    } else if (file.type.startsWith('video/')) {
        const video = document.createElement('video');
        video.src = URL.createObjectURL(file);
        video.muted = true;
        video.loop = true;
        video.autoplay = false;
        video.controls = false;
        previewMedia.appendChild(video);
        video.addEventListener('loadedmetadata', () => video.currentTime = Math.min(video.duration, 1));
    } else {
        const icon = document.createElement('div');
        icon.className = 'upload-file-icon';
        icon.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
        previewMedia.appendChild(icon);
    }

    previewName.textContent = file.name;
    previewSize.textContent = formatSize(file.size);

    dzEmpty.hidden = true;
    dzPreview.hidden = false;
    dropzone.classList.add('has-file');

    submitBtn.disabled = false;
    submitText.textContent = 'upload';
}

function removeFile() {
    fileInput.value = '';
    previewMedia.innerHTML = '';
    dzEmpty.hidden = false;
    dzPreview.hidden = true;
    dropzone.classList.remove('has-file');
    submitBtn.disabled = true;
    submitText.textContent = 'select a file';
    clearError();

    if (previewMedia.querySelector('img')) {
        URL.revokeObjectURL(previewMedia.querySelector('img')?.src);
    }
    if (previewMedia.querySelector('video')) {
        URL.revokeObjectURL(previewMedia.querySelector('video')?.src);
    }
}

dropzone.addEventListener('click', (e) => {
    if (e.target.closest('.upload-preview-remove')) return;
    if (!dzPreview.hidden) return;
    fileInput.click();
});

dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
});

dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
        const file = e.dataTransfer.files[0];
        fileInput.files = e.dataTransfer.files;
        showPreview(file);
    }
});

fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
        showPreview(fileInput.files[0]);
    }
});

previewRemove.addEventListener('click', removeFile);

uploadForm.addEventListener('submit', () => {
    submitBtn.disabled = true;
    submitText.hidden = true;
    uploadSpinner.hidden = false;
});
</script>
{% endblock %}
