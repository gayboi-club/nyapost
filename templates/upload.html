{% extends "base.html" %}
{% block title %}upload — nyapost{% endblock %}
{% block content %}
<div class="upload-container">
    <h1>upload a nyapost</h1>
    <p class="upload-fallback-text">pick a file and itll upload automatically</p>
    <form action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="file" name="file" id="fallback-file" accept=".jpg,.jpeg,.png,.gif,.webp,.mp4,.webm,.mov" onchange="this.form.submit()" class="upload-fallback-input">
        <label for="fallback-file" class="btn btn-primary upload-fallback-label">choose file</label>
    </form>
</div>
{% endblock %}
