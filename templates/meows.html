{% extends "base.html" %}
{% block title %}meows{% endblock %}
{% block content %}
<div class="meows-header">
    <h1>meows</h1>
</div>

<div class="meows-feed" id="meows-feed">
    <div class="meows-loader" id="meows-loader">loading...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
const feed = document.getElementById('meows-feed');
const loader = document.getElementById('meows-loader');
let page = 1;
let loading = false;
let hasMore = true;

function formatSize(bytes) {
    if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return bytes + ' B';
}

function loadPage() {
    if (loading || !hasMore) return;
    loading = true;
    loader.textContent = 'loading...';
    loader.hidden = false;

    fetch('/api/meows?page=' + page + '&per_page=5')
        .then(r => r.json())
        .then(memes => {
            if (memes.length === 0) {
                hasMore = false;
                loader.textContent = 'no more meows :3';
                return;
            }

            memes.forEach(m => {
                const isVideo = m.mime_type.startsWith('video/');
                const card = document.createElement('div');
                card.className = 'meow-card';

                const media = document.createElement('div');
                media.className = 'meow-media';

                if (isVideo) {
                    media.innerHTML = '<video src="/media/' + m.id + '" loop muted autoplay playsinline></video>';
                } else {
                    media.innerHTML = '<img src="/media/' + m.id + '" alt="" loading="lazy">';
                }

                const info = document.createElement('div');
                info.className = 'meow-info';
                info.innerHTML = '<a href="/p/' + m.id + '" class="meow-title">' + m.original_name.replace(/</g, '&lt;') + '</a>'
                    + '<span class="meow-meta">'
                    + (m.uploaded_by_name ? m.uploaded_by_name + ' &middot; ' : '')
                    + formatSize(m.file_size)
                    + '</span>';

                card.appendChild(media);
                card.appendChild(info);
                feed.insertBefore(card, loader);
            });

            page++;
            loading = false;
            loader.hidden = true;
        })
        .catch(() => {
            loader.textContent = 'failed to load :3';
            loading = false;
        });
}

loadPage();

const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
        loadPage();
    }
}, { rootMargin: '400px' });

observer.observe(loader);
</script>
{% endblock %}
