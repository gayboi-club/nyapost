{% extends "base.html" %}
{% block title %}meows{% endblock %}
{% block content %}
<div class="meows-feed" id="meows-feed">
    <a href="{{ url_for('index') }}" class="meows-back" title="home">nyapost</a>
    <div class="meows-sentinel" id="meows-sentinel">
        <span class="meows-loader" id="meows-loader">loading...</span>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const feed = document.getElementById('meows-feed');
const sentinel = document.getElementById('meows-sentinel');
const loader = document.getElementById('meows-loader');

let queue = [];
let loading = false;

let activeCard = null;
let soundOn = false;

function toggleSound() {
    soundOn = !soundOn;
    const video = activeCard?.querySelector('video');
    if (video) {
        video.muted = !soundOn;
        updateSoundBtn(activeCard);
    }
}

function updateSoundBtn(card) {
    const btn = card?.querySelector('.meow-sound');
    if (!btn) return;
    const video = card.querySelector('video');
    if (!video) { btn.hidden = true; return; }
    btn.innerHTML = video.muted
        ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
        : '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>';
}

function togglePause() {
    const video = activeCard?.querySelector('video');
    if (!video) return;
    if (video.paused) {
        video.play().catch(() => {});
    } else {
        video.pause();
    }
    updatePauseBtn(activeCard);
}

function updatePauseBtn(card) {
    const btn = card?.querySelector('.meow-pause');
    if (!btn) return;
    const video = card.querySelector('video');
    if (!video) { btn.hidden = true; return; }
    if (video.paused) {
        btn.innerHTML = '<svg width="50" height="50" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>';
        btn.hidden = false;
    } else {
        btn.hidden = true;
    }
}

function playCard(card) {
    if (activeCard === card) return;
    if (activeCard) {
        const v = activeCard.querySelector('video');
        if (v) { v.pause(); v.currentTime = 0; }
    }
    activeCard = card;
    const video = card.querySelector('video');
    if (video) {
        video.muted = !soundOn;
        video.play().catch(() => {});
        updateSoundBtn(card);
        updatePauseBtn(card);
    }
}

const cardObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
        if (entry.isIntersecting) {
            playCard(entry.target);
        } else if (entry.target === activeCard) {
            const v = entry.target.querySelector('video');
            if (v) { v.pause(); v.currentTime = 0; }
            activeCard = null;
        }
    }
}, { threshold: [0.6] });

function buildCard(m) {
    const isVideo = m.mime_type && m.mime_type.startsWith('video/');
    const card = document.createElement('div');
    card.className = 'meow-card';

    const media = document.createElement('div');
    media.className = 'meow-media';

    if (isVideo) {
        media.innerHTML = '<video src="/media/' + m.id + '" loop muted playsinline preload="auto"></video>'
            + '<div class="meow-pause"></div>'
            + '<button type="button" class="meow-sound" aria-label="toggle sound">'
            + '<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'
            + '</button>';
        const videoEl = media.querySelector('video');
        videoEl.addEventListener('click', togglePause);
        media.querySelector('.meow-sound').addEventListener('click', (e) => {
            e.stopPropagation();
            toggleSound();
        });
    } else {
        media.innerHTML = '<img src="/media/' + m.id + '" alt="" loading="lazy">';
    }

    const overlay = document.createElement('div');
    overlay.className = 'meow-overlay';
    overlay.innerHTML = '<div class="meow-overlay-info">'
        + '<a href="/p/' + m.id + '" class="meow-title">'
        + m.original_name.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</a>'
        + '<span class="meow-meta">'
        + (m.uploaded_by_name ? m.uploaded_by_name : '')
        + '</span>'
        + '</div>';

    card.appendChild(media);
    card.appendChild(overlay);
    cardObserver.observe(card);
    return card;
}

function fetchBatch() {
    if (loading) return Promise.resolve();
    loading = true;
    loader.textContent = 'loading...';

    return fetch('/api/meows?count=10', { signal: AbortSignal.timeout(10000) })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
            for (const m of data.memes) {
                queue.push(m);
            }
            loading = false;
            loader.textContent = '';
        })
        .catch(() => {
            loader.textContent = 'failed to load';
            loading = false;
        });
}

function addCards() {
    while (queue.length > 0) {
        feed.insertBefore(buildCard(queue.shift()), sentinel);
    }
}

fetchBatch().then(() => {
    addCards();
});

const sentinelObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !loading && queue.length === 0) {
        loader.textContent = 'loading...';
        fetchBatch().then(() => addCards());
    }
}, { rootMargin: '800px' });

sentinelObserver.observe(sentinel);
</script>
{% endblock %}
